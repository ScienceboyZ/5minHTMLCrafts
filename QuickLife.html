  <style>
   :root{
    --purple-text: #8b6ddd;
    --yellow-text: #fcd34d;
    --gray-line:  rgb(68, 65, 87);
    --background-color: rgb(42 42 44);
    --option-background: rgb(87, 87, 87);
    --disabled-option-background: rgb(70, 70, 70);
}

.clear{
    clear: both;
}

#text-container p {
    margin-top: 2px;
}

*{
    padding: 0;
    margin: 0;
    font-family: sans-serif;
}


body{
    background-color: var(--background-color);
    color: white;
}

hr {
    border-color: #696969;
}

.modal{
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.3);
    transition: all ease 0.5s;
    display: none;
    align-items: center;
    justify-content: center;
    
}

.flex {
    display: flex !important;
}

.event-container{
    background-color: #3b3b3b;
    color: white;
    width: 300px;
    border-radius: 10px;
    max-height: 800px;
    z-index: 5; 
    animation-name: event-popup;
    animation-duration: 0.2s;
}

.event-container p {
    line-height: 20px;
}

@keyframes event-popup {
    from {
        width: 0;
        height: 0;
    }
    to {
        width: 300px;
        height: min-content;
    }
}

.event-title{
    text-align: center;
    padding: 10px;
}

.event-body{
    padding: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.option{
    cursor: pointer;
    font-size: 1.2em;
    padding: 5px;
    border: 2px solid var(--gray-line);
    background-color: var(--option-background);
    border-radius: 5px;
    width: 170px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 5px auto;
    position: relative;
}


.yellow {
    color: #bece63
}

#navbar{
    background-color: rgb(56, 56, 56);
    width: 100%;
    min-height: 50px;
    display: flex;
    flex-direction: row;
    align-items: center;
    position: fixed;
}

#money-container{
    margin: 0 auto;
    padding: 5px;
    cursor: pointer;
    border-radius: 10px;
    min-width: 60px;
    transition: all ease 0.3s;
}

#money-container:hover {
    background-color: #303030;
}

.row{
    display: flex;
    flex-direction: row;
    align-items: center;
    position: relative;
}

.row:nth-child(2){
    margin-top: 5px;
    min-height: 50px;
    width: 100%;
    display: flex;
    justify-content: space-between;
}

.btn{
    color: #48c267;
    padding: 15px;
    border-radius: 50%;
    font-size: 1.1em;
    border: 2px solid var(--gray-line);
    background-color: #2c2428;
    cursor: pointer;
}

#age-btn{
    margin: 0 auto;
    color: #48c267;
    padding: 20px 50px;
    border-radius: 5%;
    font-size: 1.1em;
    border: 2px solid var(--gray-line);
    background-color: #2c2428;
    cursor: pointer;
    
}

#activities-btn{
    float: right;
    color: #48c267;
    padding: 20px 20px;
    border-radius: 50%;
    font-size: 1.1em;
    border: 2px solid var(--gray-line);
    background-color: #2c2428;
    cursor: pointer;
}

#stats-list{
    clear: both;
    height: min-content;
    display: block;
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 2px solid var(--gray-line);
    border-radius: 2%;
    padding: 5px;
    background-color: #2c2428;
}

#stats-list li{
    text-align: right;
    display: flex;
    flex-direction: row;
    margin: 2px;
    float: right;
    width: 100%;
    justify-content: end;
}

#stats-list ul {
    margin: 0 auto;
}

.bar{
    margin-left: 5px;
    background-color: rgb(68, 65, 87);
    width: 250px;
}

.bar-progress{
    height: 100%;
    animation-duration: 0.4s;
}

@keyframes animation-bar {
    from {
        width: 0;
    }
}

.bar-percentage{
    float: right;
    
}

#tale-container{
    margin: 10px auto;
    width: 365px;
    border: 2px solid rgb(68, 65, 87);
    border-radius: 2%;
    background-color: #2c2428;
}

#text-container{
    overflow-y: auto;
    height: calc(100vh - 500px);
    padding: 15px;
}

*::-webkit-scrollbar {
    background-color: #303030;
    width: 15px;
}

*::-webkit-scrollbar-thumb {
    background-color: #505050;
    border-radius: 15px;
}

#head-container{
    padding: 15px;
    text-align: center;
    border-bottom: 2px solid rgb(68, 65, 87);;
}

main{
    padding-top: 65px;
}

#menu-template{
    background-color: rgb(41, 41, 41);
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    display: none;
    animation-name: menu-popup;
    animation-duration: 0.3s;
    padding: 0;
}

@keyframes menu-popup {
    from{
        bottom: -100%;
    }
    to{
        bottom: 0;
    }
}

#menu-template ul:not(#inventory-container) {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
}

#menu-template li:not(.item-container){
    list-style: none;
    width: 300px;
    display: flex;
    justify-content: left;
    color: white;
    text-decoration: none;
}

#menu-template h2{
    font-size: 1.6em;
    text-align: center;
}

#menu-template img:not(.item-preview){
    width: 60px;
    height: 50px;
    margin-right: 5px;
    float: left;
}

.menu-header{
    display: flex;
    flex-direction: row;
    padding: 5px;
    margin-top: 15px;
}

.menu-header h2 {
    margin: 0 auto;
    text-align: center;
}

.menu-header button {
    float: right;
    margin-right: 15px;
}

a{
    text-decoration: none;
    color: white;
}

#close-menu{
    background: none;
    border: none;
    font-size: 1.5em;
    cursor: pointer;
    color: #ffff;
    position: absolute;
    right: 15px;
}

#control-container{
    margin: 0 auto;
    width: 360px;
}

hr{
    margin-bottom: 10px;
}

#stats-container{
    display: flex;
    justify-content: center;
}

select{
    margin: 0 auto;
    width: 80%;
    padding: 15px ;
    background-color:rgb(56, 56, 56);
    color: white;
    font-size: 20px;
    border-radius: 15px;
}

#menu-template select{
    margin: 0 auto;
    width: 324px;
    padding: 15px ;
    background-color:rgb(56, 56, 56);
    color: white;
    font-size: 20px;
    border: none;
    border-radius: 15px;
}

#menu-template #select-container{
    display: flex;
    justify-content: center;
    margin-top: 30px;
    width: 100%;
}

.switch{
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background-color: #bece63;
}

.switch-background{
    background-color: rgb(109, 33, 105);
    width: 50px;
    height: 20px;
    padding: 1px;
    border-radius: 100%;
    margin-right: 15px;
}

li{
    list-style: none;
}

.relationship-container{
    margin: 0 auto;
    margin-bottom: 5px;
    background-color: #7b4891;
    padding: 10px 20px;
    border: 2px solid #693b7c;
    border-radius: 5px;
    cursor: pointer;
}

.relationship-container p{
    display: flex;
    flex-direction: column;
    justify-content: right;
}

.relation-background{
    margin-left: 5px;
    background-color: rgb(89, 56, 121);
    width: 235px;
    height: 15px;
}

.relation{
    height: 100%;
}

.opinion-data-wrapper{
    display: flex;
    flex-direction: column;
}

.window-bar{
    width: 250px;
    height: 15px;
    background-color: #303030;
}

.event-container hr{
    animation-name: loading-hr;
    animation-duration: 0.5s;
    margin: 0 auto;
}

#event-container {
    display: none;
}

@keyframes loading-hr{
    from{
        width: 0;
    } to{
        width: 100%;
    }
}

.disabled{
    background-color: var(--disabled-option-background);
    color: #969696 !important;
    cursor: not-allowed;
}

#job-wrapper{
    width: 350px;
    margin: 0 auto;
}

#jobs-container{
    height: 80vh;
    border: 2px solid #636363;
    margin: 0 auto;
    padding: 0 ;
    align-items: flex-start !important;
    justify-content: flex-start !important;
    overflow-y: auto;
}

.cell{
    height: 2em;
    background-color: #303030;
    border-bottom: 1px solid #636363;
    padding: 10px;
    cursor: pointer;
}

.cell:hover{
    background-color: #4d4d4d;
}

.column{
    display: flex;
    flex-direction: column;
}

.switch-container{
    position: absolute;
    right: 5px;
}

.green{
    color: #15c53b;
}


.item-container{
    background-color: #303030;
    width: 120px !important;
    height: 150px;
    margin: 15px;
    cursor: pointer;
}

.item-container figcaption{
    text-align: center;
}

#inventory-container{
    display: flex;
    flex-direction: row !important;
    justify-content: center;
    align-items: baseline !important;
    flex-wrap: wrap;
    padding: 15px;

}

.item-preview{
    width: 120px;
    height: 80%;
}

#no-items{
    text-align: center;
    font-size: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 150px);
}

#money-container{
    text-align: center;
}

#relation-button{
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
}

.button-container{
    text-align: center;
    font-size: 15px;
}

#relationship-container{
    margin: 0 auto;
}

#cell-container{
    height: 80vh;
    border: 2px solid #636363;
    margin: 0 auto;
    padding: 0 ;
    align-items: flex-start !important;
    justify-content: flex-start !important;
    overflow-y: auto;
    position: relative;
}

.tab{
    padding: 5px;
    background-color: #3b3b3b;
    border: 2px solid #636363;
    border-bottom: none;
    width: 45%;
    border-top-left-radius: 5px;
    border-top-right-radius: 5px;
    z-index: 100;
    text-align: center;
    cursor: pointer;
}

.tab:hover{
    background-color: #4d4d4d;
}

.active{
    background-color: #4d4d4d;
}

.assetsContainer{
    width: 350px;
    margin: 0 auto;
}

#assets-header{
    display: flex;
    flex-direction: row;
    justify-content: space-between;
}

#death-screen{
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: #3b3b3b;
    display: none;
}
#death-screen-body{
    margin: 0 auto;
    width: 350px;
}

#death-screen button{
    margin: 0 auto;
    padding: 5px 15px;
    font-size: 20px;
    
}

#death-screen-title{
    text-align: center;
    padding: 5px;
}

#obituary-container{
    padding: 15px;
    margin: 0 auto;
    border: 2px solid #636363;
    border-radius: 15px;
    overflow-y: auto;
    height: 80vh;
    margin-bottom: 15px;
}

.relationships-container{
    width: 360px;
    margin: 0 auto;
}

.relationships-container h3{
    font-size: 1.5em;
}

#create-character-screen{
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 10;
    background-color: rgba(27, 27, 27, 0.904);
}

#create-character-screen h1{
    width: 350px;
    text-align: center;
    margin: 0 auto;
    color: var(--yellow-text);
    margin-top: 15px;
    font-size: 32px;
}

.create-btn{
    padding: 10px 30px;
    width: 340px;
    font-size: 25px;
    margin: 15px auto;
    cursor: pointer;
    background-color: black;
    border: 2px solid var(--purple-text);
    color: var(--purple-text);
    transition: ease 0.5s;
    border-radius: 15px;
}

.create-btn:hover{
    border: 2px solid #c373e6;
    color: #c373e6;
}

#buttons-container{
    display: flex;
    flex-direction: column;
    width: 350px;
    margin: 30px auto;
}

#create-character-screen input, .event-body input{
    padding: 5px;

    width: 350px;

.input-group label{

#skills-icon{

}

.btn img{

}

.rectangular-btn{

.bar-container {

.green{

const itemListifier = (obj, property, objName) => {
    let string = '';
    let index = 0;
    let collection = obj[property]
    if(objName === 'items')
        for(let element of obj[property]) {
            string = string.concat(`<li onclick="windows.items.buyWindow(this)" id="${property}-${index}" data-objName="${objName}" data-property="${property}" data-index="${index}" class="option">${element.label} (${moneyFormat(element.price)} $)</li>`)

    let newWord = []

        else newWord.push(word.split('')[i])
    } return newWord = newWord.join('')

const moneyFormat = (money) => {
    money = money.toString()
    let parsedMoney = []
    let amountOfNumbers = 0;

    for(let i = money.length - 1; i >= 0; i--){
        parsedMoney.unshift(money[i])
        amountOfNumbers++;

        if(amountOfNumbers === 3){
            parsedMoney.unshift('.')
            amountOfNumbers = 0  
        }
    } 
    if(parsedMoney[0] == '-' && parsedMoney[1] == '.') {
        parsedMoney.splice(1, 1)
        return parsedMoney.join('')
    } else if(parsedMoney[0] !== '.') return parsedMoney.join('')
    return parsedMoney.join('').slice(1)
}

    if(typeof string !== 'string') return string

    let arr = []

            arr.push(' ')
            arr.push(string[i].toLowerCase())

const pregnancyHandler = (person) => {
    if(!person.pregnant) return 

    person.pregnant = false;
    const partner = person.relationships.partner[0]
    const possibleGenders = ['male', 'female']
    const gender = possibleGenders[Math.round(Math.random())]
    
    if(person.characterIndex == player.characterIndex || person.characterIndex == player.characterIndex.relationships.partner[0]){
        const pronoun = gender === 'male' ? 'him' : 'her'
        modalBackground.style.display = 'flex'
        eventTitle.innerText = `Its a ${gender == 'male' ? 'boy' : 'girl'}`
        eventBody.innerHTML = `
        <p>How will you call ${pronoun}</p>
        <input type="text" placeholder="name" id="name-field">
        <div class="option" onclick="createChild('${person.characterIndex}', '${gender}')">Name ${pronoun}</div>
        <div class="option" onclick="randomNameForChildren('${person.characterIndex}')">Random</div>
        `
        return
    }
    const nationality = nationalityQuery(person.location)
    const offspring = new Person(undefined, partner != undefined ? partner.surname : person.surname, 0, gender, nationality)
    person.relationships.offspring.push(offspring)
    offspring.relationships.parents.push(person)
    if(partner != undefined){
        partner.relationships.offspring.push(offspring)
        offspring.relationships.parents.push(partner)
    }

    characters.push(offspring)
}

        }
    }
}

                    let count = values.length

                    }
                    if (count === 0) requirementsCompleted++
                }

                statVerifier()

            }

        workHarder() {
            closeEvent()
            menuTemplate.style.display = 'none'
            textContainer.innerHTML += `
            <p>I worked harder at my job</p>
            `
            player.job.performance += Math.floor(Math.random() * 10)
            player.stats.happiness -= 5
            player.stats.health -= 2
            player.actions.workHarder++;
            statsLimit(player)
        },
        askPromotion() {
            player.actions.performance++
            modalBackground.style.display = 'flex'
            eventTitle.innerText = 'Promotion'
            if (player.job.performance >= 70)
                for (let job of jobs) {
                    if (job.label === player.job.promotion) {
                        player.job.until = year
                        player.cv.push(player.job)

                        player.job = structuredClone(job)
                        player.job.since = year

                        eventBody.innerHTML = `
                        <p>Your promotion request has been accepted</p>
                        <div class="option" onclick="closeEvent()">Close</div>
                        `
                        menu.job()
                        break;
                    }
                }
            else {
                eventBody.innerHTML = `
                <p>Your promotion request has been rejected</p>
                <div class="option" onclick="closeEvent()">Close</div>
                `
            }
        },
        currentJob() {
            showEvent({
                title: 'Current Job',
                body: `
                <p><b>Current job: </b>${player.job.label}</p>
                <p><b>Salary: </b>${moneyFormat(player.job.salary)} $</p>
                <p><b>Next position: </b>TO DO</p>
                <p><b>Years working: </b>${year - player.job.since}</p>
                <p><b>Performance:</b> ${player.job.performance}/100</p>
                <div class="window-bar">
                    <div style="background-color:#b7b34b;width:${player.job.performance}%;height: 100%""></div>
                </div> 
                <ul>

                <div class="option" onclick="windows.job.confirmLeave()">Leave this job</div>
                ${player.actions.workHarder < 3 ? `
                    <div class="option" onclick="windows.job.workHarder()">Work harder</div>
                ` : ''}
                ${player.job.promotion !== 'none' && player.actions.askPromotion < 3 ? `
                <div class="option" onclick="windows.job.askPromotion()">Ask promotion</div>
                ` : ''}
                <div class="option" onclick="closeEvent()">Close</div>
                </ul>
                `
            })
        },
    },
    freetime: {
        handleSwitch(option) {
            const notEnoughMoney = () => {
                showEvent({
                    title: 'Freetime',
                    body: `
                    <p>You do not have enough money</p>
                    <div class="option" onclick="closeEvent()">Close</div>    
                    `
                })
            }
            let freetime = player.freetime;
            let button = document.getElementById(`freetime-${option}`)
            switch (option) {
                case 'reading':
                    if (player.age < 8) return
                    if (player.money.total < 200) return notEnoughMoney()
                    freetime.isReading ? freetime.isReading = false : freetime.isReading = true;
                    freetime.isReading ? button.style.float = 'right' : button.style.float = 'left'
                    freetime.isReading ? player.money.expenses += 200 : player.money.expenses -= 200
                    break;
                case 'parties':
                    if (player.age < 2) return
                    if (player.money.total < 500) return notEnoughMoney()
                    freetime.isAttendingParties ? freetime.isAttendingParties = false : freetime.isAttendingParties = true;
                    freetime.isAttendingParties ? button.style.float = 'right' : button.style.float = 'left'
                    freetime.isAttendingParties ? player.money.expenses += 500 : player.money.expenses -= 500
                    break;
                case 'musicLessons':
                    if (player.age < 7) return
                    if (player.money.total < 2000) return notEnoughMoney()
                    freetime.isTakingMusicLessons ? freetime.isTakingMusicLessons = false : freetime.isTakingMusicLessons = true;
                    freetime.isTakingMusicLessons ? button.style.float = 'right' : button.style.float = 'left'
                    freetime.isTakingMusicLessons ? player.money.expenses += 2000 : player.money.expenses -= 2000
                    break;
                case 'gym':
                    if (player.age < 16) return
                    if (player.money.total < 1800) return notEnoughMoney()
                    freetime.goesToGym ? freetime.goesToGym = false : freetime.goesToGym = true;
                    freetime.goesToGym ? button.style.float = 'right' : button.style.float = 'left'
                    freetime.goesToGym ? player.money.expenses += 1800 : player.money.expenses -= 1800
                    break;
                default:
                    break;
            }
            moneyViewer()
        },
        cinema: {
            display() {
                if (player.age < 12) return

                showEvent({
                    title: 'Cinema',
                    body: `
                    <h3>Price: 400$</h3>
                    <div class="option" onclick="windows.freetime.cinema.pay(400)">Pay</div>
                    <div class="option" onclick="closeEvent()">Cancel</div>    
                    `
                })
            },
            pay(money) {
                if (player.money.total >= money) {
                    player.money.total -= money;
                    player.stats.happiness += 3;
                    eventTitle.innerText = 'Cinema';
                    eventBody.innerHTML = `
                        <h3>You went to the cinema</h3>
                        <div class="option" onclick="closeEvent()">Nice</div>
                        `;
                    textContainer.innerHTML += `<p>I watched a movie at a cinema</p>`
                    moneyViewer()
                } else {
                    eventTitle.innerText = 'Cinema';
                    eventBody.innerHTML = `
                        <h3>You do not have enough money</h3>
                        <div class="option" onclick="closeEvent()">...</div>
                        `;
                }
            }
        },
        restaurant: {
            display() {
                if (player.age < 12) return

                showEvent({
                    title: 'Restaurant',
                    body: `
                    <h3>This would cost 250$</h3>
                    <div class="option" onclick="windows.freetime.restaurant.pay(400)">Pay</div>
                    <div class="option" onclick="closeEvent()">Leave</div>    
                    `
                })
            },
            pay(money) {
                if (player.money.total >= money) {
                    player.money.total -= money;
                    player.stats.happiness += 3;
                    showEvent({
                        title: "Restaurant",
                        body: `
                        <h3>You paid the restaurant</h3>
                        <div class="option" onclick="closeEvent()">Nice</div>
                        `
                    })
                    textContainer.innerHTML += `<p>I went to a restaurant</p>`
                    moneyViewer()
                } else {
                    showEvent({
                        title: "Restaurant",
                        body: `
                        <h3>You do not have enough money</h3>
                        <div class="option" onclick="closeEvent()">...</div>
                        `
                    })
                }
            }
        },
        goClubbing: {
            display() {
                if (player.age < 18) return

                modalBackground.style.display = 'flex'
                eventTitle.innerText = 'Go clubbing'
                const possibilities = Math.round(Math.random() * 3)

                player.stats.happiness += Math.floor(Math.random() * 5)
                statsLimit(player)
                textContainer.innerHTML += `
                <p>I went clubbing</p>
                `
                handleStatBars(player, true)
                if (possibilities <= 1)
                    showEvent({
                        title: "Go clubbing",
                        body: `
                        <p>You had fun at the club</p>
                        <div class="option" onclick="closeEvent()">Close</div>
                        `
                    })
                else if (possibilities === 2) {
                    const drinks = items.alcoholic
                    // const drinks = ['beer', 'wine', 'vodka']
                    const random = Math.floor(Math.random() * drinks.length)
                    const drink = drinks[random].label.toLowerCase()
                    showEvent({
                        title: "Go clubbing",
                        body: `
                        <p>You have been offered a ${drink}</p>
                        <div class="option" onclick="windows.freetime.goClubbing.acceptDrink('${drink}')">Accept</div>
    
                        <div class="option" onclick="windows.freetime.goClubbing.decline()">Refuse</div>
                    `
                    })
                    textContainer.innerHTML += `<p>I have been offered a ${drink}</p>`
                }
                else if (possibilities === 3) {
                    const drugs = [
                        {
                            name: 'LSD',
                            damage: 5
                        },
                        {
                            name: 'weed',
                            damage: 3
                        },
                        {
                            name: 'heroin',
                            damage: 12
                        },
                        {
                            name: 'cocaine',
                            damage: 10
                        }
                    ];
                    const random = Math.floor(Math.random() * drugs.length)
                    const drug = drugs[random]

                    textContainer.innerHTML += `<p>I have been offered ${drug.name}</p>`
                    showEvent({
                        title: "Go clubbing",
                        body: `
                        <p>You have been offered ${drug.name}</p>
                        <div class="option" onclick="windows.freetime.goClubbing.acceptDrug(${drug.damage})">Accept</div>
                        <div class="option" onclick="windows.freetime.goClubbing.decline()">Refuse</div>
                        `
                    })
                }
            },
            acceptDrink(drink) {
                menuTemplate.style.display = 'none'
                eventBody.innerHTML = `
                <p>You accepted the ${drink}</p>
                <div class="option" onclick="closeEvent()">Close</div>
                `
                textContainer.innerHTML += `<p>I accepted the ${drink}</p>`
                const random = Math.floor(Math.random() * 8)
                player.stats.health -= random
                statsLimit(player)
                handleStatBars(player, true)
            },
            acceptDrug(damage) {
                menuTemplate.style.display = 'none'
                closeEvent()
                player.stats.health -= damage
                statsLimit(player)
                textContainer.innerHTML += `<p>I accepted</p>`
                handleStatBars(player, true)
            },
            decline() {
                menuTemplate.style.display = 'none'
                closeEvent()
                textContainer.innerHTML += `
                <p>I declined</p>
                `
            }
        },
    },
    handleRelationBars() {
        let progressBars = document.getElementsByClassName('relation');
        for (let element of Object.entries(progressBars)) {
            let index = parseInt(element[1].id.split('-')[1])
            let category = element[1].id.split('-')[0]
            let opinion = player.relationships[category][index].stats.relationWithPlayer;
            element[1].style.width = `${opinion}%`
        }

        for (let progressBar of progressBars) {
            let percentage = parseInt(progressBar.style.width.split('%')[0]);
            if (percentage > 55) progressBar.style.backgroundColor = 'rgb(47, 151, 73)'
            else if (percentage > 25) progressBar.style.backgroundColor = 'rgb(196, 221, 105)'
            else progressBar.style.backgroundColor = 'rgb(185, 61, 61)'
        }
    },
    throwParty() {
        player.stats.happiness += 10;
        eventBody.innerHTML = `
            <p>You threw an amazing party</p>
            <br>
            <div class="option" onclick="closeEvent()">Close</div>
            `
        textContainer.innerHTML += `<p>I organized a party at home</p>`
        statsLimit(player)
        menuTemplate.style.display = 'none'
        handleStatBars(player, true)
    },
}
  </script>
  <script>
   const ageButton = document.getElementById('age-btn');

let modalBackground = document.getElementById('modal-background');
let eventBox = document.getElementById('event-box');
let eventTitle = document.getElementById('event-title');
let eventBody = document.getElementById('event-body')
let options = document.getElementsByClassName('option')

let textContainer = document.getElementById('text-container');

let year = Math.round(Math.random() * 20) + 2000;


//this is when you customize your character

        <input min="0" step="10000" id="money" type="number">
        <button onclick="customCharacter()" class="create-btn">Create</button>
    </div>

    //these two prevent typing white spaces in the inputs
    const inputName = document.getElementById('name');
    inputName.addEventListener('input', e => {
        e.target.value = e.target.value = e.target.value.replace(/\W|\d/, '')
    })

    const inputSurname = document.getElementById('surname');
    inputSurname.addEventListener('input', e => {
        e.target.value = e.target.value = e.target.value.replace(/\W|\d/, '')
    })
}

//called after dying
const newLife = () => {
    const deathScreen = document.getElementById('death-screen');
    const characterScreen = document.getElementById('create-character-screen')
    textContainer.innerHTML = ''

    deathScreen.style.display = 'none'
    characterScreen.style.display = 'block'
}

//im gonna move this somewhere else
const deathScreen = () => {
    const ageBtnContainer = document.getElementById('age-btn-container');
    ageBtnContainer.innerHTML = `
    <button id="age-btn" onclick="annualChanges()">Age</button>
    `

    const obituaryContainer = document.getElementById('obituary-container');

    const siblingLength = player.relationships.siblings.length;
    const dadName = player.relationships.parents[0].fullName
    const momName = player.relationships.parents[1].fullName
    const pronoun = player.gender === 'male' ? 'He' : 'She'

    obituaryContainer.innerHTML = `
    <p>${player.fullName} was born in ${player.birthplace} at year ${year - player.age}. ${pronoun} was son of ${dadName} and ${momName}${siblingLength !== 0 ? `, ${player.gender === 'male' ? 'brother' : 'sister'} of ${siblingLength} ${siblingLength > 1 ? 'persons' : 'person'}.` : '.'}</p><br>
    `

    if (player.cv.length !== 0) {
        obituaryContainer.innerHTML += `<h4 class="yellow">He worked as:</h4>
        ${cvListifier(player)}<br>
        `
    } else obituaryContainer.innerHTML += `<p>${pronoun} never got a job.</p><br>`

    obituaryContainer.innerHTML += `<p>${pronoun} left this world with ${moneyFormat(player.money.total)} $ on his bank account. ${player.inventory.houses.length !== 0 ? `${pronoun} had ${player.inventory.houses.length} properties.` : `${pronoun} was homeless.`}</p><br>`

    obituaryContainer.innerHTML += `
    <h3 class="yellow">Criminal record: </h3>
    <ul>
    <li><b class="yellow">Murder: </b>${player.criminalRecord.murder}</li>
    <li><b class="yellow">Murder attempts:</b>${player.criminalRecord.murderAttempts}</li>
    </ul><br>
    `

    obituaryContainer.innerHTML += `
    <p>${pronoun} passed away at age of ${player.age} ${player.deathCause} in ${player.location}</p>
    `

    document.getElementById('death-screen').style.display = 'block'
}

const annualChanges = () => {
    year++;
    for (let person of characters) {
        if (person.alive) person.age++;
        pregnancyHandler(person)
    }

    textContainer.innerHTML += `
    <p><span class="yellow">${year} - ${player.age} years old</span></p>
    `

    //death possibility
    for (let person of characters) {
        randomDeath(person)
    }

    // shows if player is in the stage of childhood, adulthood or elderhood
    lifeStageDisplayer()

    //this is for events such as first words and university
    specificEvents()

    //random messages
    if (Math.floor(Math.random() * 10) === 5)
        textContainer.innerHTML += `<p>${worldEventsMethodArr[Math.floor(Math.random() * worldEventsAmount)][1]()}</p>`

    player.money.total += player.money.income - player.money.expenses

    // job related stats
    if (player.job !== 'none') {
        const random = Math.round(Math.random())
        if (random === 0)
            player.job.performance += Math.floor(Math.random() * 5)
        else
            player.job.performance -= Math.floor(Math.random() * 5)
    }

    if(player.currentCareer.studying) player.currentCareer.buff(player);

    statsBuffer()
    statsLimit(player)
    handleStatBars(player, true);
    skillLeveler()

    scrolldown(textContainer)

    //displaying flow of money
    moneyViewer()

    resetAvaibleActions()

    randomizeHouseStats()
    prisonHandler(player)
    eventsHandler()
}

    menuTemplate.style.display = 'none'
})
