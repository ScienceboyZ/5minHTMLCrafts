<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iPad Shooter Game</title>
    <style>
        body {
            text-align: center;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            touch-action: manipulation; /* Improves touch responsiveness */
        }
        #gameArea {
            position: relative;
            width: 90vw; /* Responsive width */
            height: 60vh; /* Responsive height */
            background-color: black;
            border: 2px solid white;
            margin: auto;
            overflow: hidden;
            touch-action: none; /* Prevents scrolling while playing */
        }
        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
        }
        .bullet {
            position: absolute;
            width: 15px;
            height: 30px;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>iPad Shooter Game</h1>
    <p>Tap inside the game area to shoot!</p>
    <p>Score: <span id="score">0</span></p>
    <div id="gameArea"></div>

    <script>
        const gameArea = document.getElementById("gameArea");
        const scoreDisplay = document.getElementById("score");
        let score = 0;

        // Create a moving target with random movement
        function createTarget() {
            const target = document.createElement("div");
            target.classList.add("target");
            gameArea.appendChild(target);

            let x = Math.random() * (gameArea.clientWidth - 50);
            let y = Math.random() * (gameArea.clientHeight - 50);
            let dx = (Math.random() * 6) - 3; // Faster random speed in x direction
            let dy = (Math.random() * 6) - 3; // Faster random speed in y direction

            function moveTarget() {
                x += dx;
                y += dy;

                // Bounce off walls
                if (x <= 0 || x >= gameArea.clientWidth - 50) dx = (Math.random() * 6) - 3;
                if (y <= 0 || y >= gameArea.clientHeight - 50) dy = (Math.random() * 6) - 3;

                target.style.left = x + "px";
                target.style.top = y + "px";

                requestAnimationFrame(moveTarget);
            }

            // Change direction randomly every 500ms
            setInterval(() => {
                dx = (Math.random() * 6) - 3;
                dy = (Math.random() * 6) - 3;
            }, 500);

            moveTarget();
        }

        // Shoot bullets (works with touch)
        function shoot(event) {
            const bullet = document.createElement("div");
            bullet.classList.add("bullet");

            // Get touch position for iPad
            let touchX = event.clientX || event.touches[0].clientX;
            bullet.style.left = touchX - gameArea.offsetLeft + "px";
            bullet.style.top = gameArea.clientHeight - 30 + "px";
            gameArea.appendChild(bullet);

            let interval = setInterval(() => {
                bullet.style.top = bullet.offsetTop - 15 + "px"; // Faster bullet speed

                // Check collision with target
                const target = document.querySelector(".target");
                if (target && bullet.offsetTop <= target.offsetTop + 50 &&
                    bullet.offsetLeft >= target.offsetLeft &&
                    bullet.offsetLeft <= target.offsetLeft + 50) {
                   
                    gameArea.removeChild(target);
                    gameArea.removeChild(bullet);
                    score++;
                    scoreDisplay.textContent = score;
                    createTarget(); // Spawn new target
                    clearInterval(interval);
                }

                // Remove bullet if it goes off screen
                if (bullet.offsetTop < 0) {
                    gameArea.removeChild(bullet);
                    clearInterval(interval);
                }
            }, 30); // Faster bullet movement
        }

        // Start game
        createTarget();
        gameArea.addEventListener("click", shoot);
        gameArea.addEventListener("touchstart", shoot); // Enables touch shooting

    </script>
</body>
</html>
