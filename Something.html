<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f0f0;
  }
  #login, #chat {
    display: none;
    max-width: 600px;
    margin: auto;
    padding: 10px;
  }
  .visible { display: block; }
  input, button {
    padding: 10px;
    font-size: 16px;
    margin: 5px 0;
    width: 100%;
    box-sizing: border-box;
  }
  #messages {
    height: 60vh;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 5px;
  }
  .message {
    padding: 5px;
    margin-bottom: 5px;
    background: #e4e4e4;
    border-radius: 5px;
  }
  .username {
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>

<div id="login" class="visible">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div id="chat">
  <h2>Messenger</h2>
  <div id="messages"></div>
  <input id="msgInput" placeholder="Type your message...">
  <button id="sendBtn">Send</button>
</div>

<script>
const accounts = {
  "Kauan": "Nig",
  "Samuel": "SabrinaC",
  "Craig": "shrek",
  "Rory": "skibidi",
  "Zac": "Thumbs"
};

let socket;
let currentUser = null;
let wsUrl = "";

async function getWsUrl() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/BlankoTheLegend/VeryHardAlgebra/refs/heads/main/Key.txt");
    wsUrl = (await res.text()).trim();
    console.log("WebSocket URL:", wsUrl);
  } catch (err) {
    alert("Failed to get server URL from GitHub");
  }
}

document.getElementById("loginBtn").addEventListener("click", () => {
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;
  if (accounts[user] && accounts[user] === pass) {
    currentUser = user;
    document.getElementById("login").classList.remove("visible");
    document.getElementById("chat").classList.add("visible");
    connectWebSocket();
  } else {
    alert("Invalid username or password");
  }
});

function connectWebSocket() {
  socket = new WebSocket(wsUrl);
  
  socket.addEventListener("open", () => {
    console.log("Connected to server");
  });

  socket.addEventListener("message", (event) => {
    const msgData = JSON.parse(event.data);
    displayMessage(msgData.username, msgData.message);
  });

  document.getElementById("sendBtn").addEventListener("click", sendMessage);
  document.getElementById("msgInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
}

function sendMessage() {
  const msg = document.getElementById("msgInput").value.trim();
  if (msg && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ username: currentUser, message: msg }));
    document.getElementById("msgInput").value = "";
  }
}

function displayMessage(username, message) {
  const msgDiv = document.createElement("div");
  msgDiv.classList.add("message");
  msgDiv.innerHTML = `<div class="username">${username}</div>${message}`;
  document.getElementById("messages").appendChild(msgDiv);
  document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}

getWsUrl();
</script>

</body>
</html>
