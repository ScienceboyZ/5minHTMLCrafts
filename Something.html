<!DOCTYPE html>
<html>
<head>
    <title>Chat Client</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 10px; }
        #messages { border: 1px solid #ccc; padding: 5px; height: 300px; overflow-y: scroll; }
        #inputArea { display: flex; margin-top: 10px; }
        #messageInput { flex: 1; padding: 5px; }
        button { padding: 5px; }
    </style>
</head>
<body>
    <h2>Chat</h2>
    <div id="messages"></div>

    <div id="inputArea">
        <input type="text" id="messageInput" placeholder="Type your message..." />
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const keyFileUrl = "https://raw.githubusercontent.com/BlankoTheLegend/VeryHardAlgebra/refs/heads/main/Key.txt";
        let socket;

        async function init() {
            try {
                const res = await fetch(keyFileUrl);
                const wsUrl = (await res.text()).trim();
                socket = new WebSocket(wsUrl);

                socket.onopen = () => {
                    addMessage("Connected to server.");
                };

                socket.onmessage = (event) => {
                    addMessage(event.data);
                };

                socket.onclose = () => {
                    addMessage("Disconnected from server.");
                };

                socket.onerror = (err) => {
                    console.error("WebSocket error:", err);
                    addMessage("Error connecting to server.");
                };

                document.getElementById("sendBtn").onclick = sendMessage;
                document.getElementById("messageInput").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") sendMessage();
                });

            } catch (error) {
                console.error("Failed to fetch Key.txt:", error);
                addMessage("Could not load server URL.");
            }
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (text && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(text);
                input.value = "";
            }
        }

        function addMessage(msg) {
            const div = document.createElement("div");
            div.textContent = msg;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        }

        init();
    </script>
</body>
</html>
