<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat Loader</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
#loginDiv, #chatDiv { max-width: 500px; margin: auto; }
#messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
input { padding: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; }
button { padding: 5px 10px; }
#status { text-align: center; margin-bottom: 10px; font-weight: bold; }
</style>
</head>
<body>

<div id="status">Disconnected</div>

<div id="loginDiv">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <p id="loginStatus"></p>
</div>

<div id="chatDiv" style="display:none;">
  <h2>Chat</h2>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type a message">
  <button id="sendBtn">Send</button>
</div>

<script>
let ws = null;
let username = null;

const statusDiv = document.getElementById('status');
const messagesDiv = document.getElementById('messages');

async function getServerURL() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/BlankoTheLegend/VeryHardAlgebra/refs/heads/main/Key.txt');
    let text = await res.text();
    text = text.trim();
    if (!text.startsWith('ws://') && !text.startsWith('wss://')) {
      text = text.replace(/^http/, 'ws'); // convert http(s) -> ws(s)
    }
    return text;
  } catch (e) {
    alert('Failed to fetch chat server URL');
  }
}

async function initWebSocket() {
  const serverURL = await getServerURL();
  if (!serverURL) return;

  ws = new WebSocket(serverURL);

  ws.onopen = () => {
    console.log('Connected to server');
    statusDiv.innerText = 'Connected';
    statusDiv.style.color = 'green';
  };

  ws.onclose = () => {
    console.log('Disconnected from server');
    statusDiv.innerText = 'Disconnected';
    statusDiv.style.color = 'red';
  };

  ws.onerror = () => {
    console.log('WebSocket error');
    statusDiv.innerText = 'Error';
    statusDiv.style.color = 'orange';
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.type === 'login') {
      if (data.success) {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('chatDiv').style.display = 'block';
      } else {
        document.getElementById('loginStatus').innerText = 'Login failed';
      }
    }
    if (data.type === 'message') {
      messagesDiv.innerHTML += `<div>${data.text}</div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  };
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  if (!username || !password) return alert('Enter username and password');

  if (!ws || ws.readyState !== WebSocket.OPEN) await initWebSocket();
  ws.send(JSON.stringify({ type: 'login', username, password }));
});

document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'message', text }));
  input.value = '';
});
</script>

</body>
</html>
