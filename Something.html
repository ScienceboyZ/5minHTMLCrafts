<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; background:#f0f0f0; }
  #login, #chat { display: none; max-width:600px; margin:auto; padding:10px; }
  .visible { display: block; }
  input, button { padding:10px; font-size:16px; margin:5px 0; width:100%; box-sizing:border-box; }
  #messages { height:60vh; overflow-y:auto; background:#fff; border:1px solid #ccc; padding:10px; margin-bottom:5px; }
  .message { padding:5px; margin-bottom:5px; background:#e4e4e4; border-radius:5px; }
  .username { font-weight:bold; color:#333; }
</style>
</head>
<body>

<div id="login" class="visible">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div id="chat">
  <h2>Messenger</h2>
  <div id="messages"></div>
  <input id="msgInput" placeholder="Type your message...">
  <button id="sendBtn">Send</button>
</div>

<script>
let socket;
let currentUser = null;
let wsUrl = "";

// Fetch WebSocket URL from GitHub
async function getWsUrl() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/BlankoTheLegend/VeryHardAlgebra/refs/heads/main/Key.txt");
    wsUrl = (await res.text()).trim();
    console.log("WebSocket URL:", wsUrl);
  } catch (err) {
    alert("Failed to get server URL from GitHub");
  }
}

// Login button handler
document.getElementById("loginBtn").addEventListener("click", () => {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !password) {
    alert("Enter username and password");
    return;
  }

  currentUser = username;
  connectWebSocket(username, password);
});

// Connect and login to WebSocket
function connectWebSocket(username, password) {
  socket = new WebSocket(wsUrl);

  socket.addEventListener("open", () => {
    // Send login message immediately
    socket.send(JSON.stringify({ username, password }));
  });

  socket.addEventListener("message", (event) => {
    const data = JSON.parse(event.data);

    // Handle system messages (like login success/fail)
    if (data.username === "System") {
      if (data.message === "Login successful!") {
        document.getElementById("login").classList.remove("visible");
        document.getElementById("chat").classList.add("visible");
      } else {
        alert(data.message);
        socket.close();
      }
      return;
    }

    // Display normal chat messages
    displayMessage(data.username, data.message);
  });

  document.getElementById("sendBtn").addEventListener("click", sendMessage);
  document.getElementById("msgInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
}

// Send chat message
function sendMessage() {
  const msg = document.getElementById("msgInput").value.trim();
  if (msg && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ message: msg }));
    document.getElementById("msgInput").value = "";
  }
}

// Display message in chat
function displayMessage(username, message) {
  const msgDiv = document.createElement("div");
  msgDiv.classList.add("message");
  msgDiv.innerHTML = `<div class="username">${username}</div>${message}`;
  document.getElementById("messages").appendChild(msgDiv);
  document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}

getWsUrl();
</script>
</body>
</html>
