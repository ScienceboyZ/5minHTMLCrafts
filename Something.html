<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Loader</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f0f0f0; }
#container { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
#status { text-align: center; font-weight: bold; margin-bottom: 10px; }
#messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; word-wrap: break-word; }
input { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; font-size: 16px; }
button { padding: 10px; width: 100%; margin-top: 5px; font-size: 16px; cursor: pointer; }
#chatDiv { display: none; }
</style>
</head>
<body>
<div id="container">
  <div id="status">Disconnected</div>

  <div id="loginDiv">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="loginStatus"></p>
  </div>

  <div id="chatDiv">
    <h2>Chat</h2>
    <div id="messages"></div>
    <input type="text" id="msgInput" placeholder="Type a message">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
let ws = null;
let username = null;
let connected = false;

const statusDiv = document.getElementById('status');
const messagesDiv = document.getElementById('messages');

async function getServerURL() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/BlankoTheLegend/VeryHardAlgebra/refs/heads/main/Key.txt');
    let text = res.text();
    text = (await text).trim();
    if (!text.startsWith('ws://') && !text.startsWith('wss://')) {
      text = text.replace(/^http/, 'ws');
    }
    return text;
  } catch (e) {
    alert('Failed to fetch chat server URL');
  }
}

async function initWebSocket() {
  if (connected) return; // Prevent multiple connections
  const serverURL = await getServerURL();
  if (!serverURL) return;

  ws = new WebSocket(serverURL);

  ws.onopen = () => {
    console.log('Connected to server');
    statusDiv.innerText = 'Connected';
    statusDiv.style.color = 'green';
    connected = true;
  };

  ws.onclose = () => {
    console.log('Disconnected from server');
    statusDiv.innerText = 'Disconnected';
    statusDiv.style.color = 'red';
    connected = false;
  };

  ws.onerror = () => {
    console.log('WebSocket error');
    statusDiv.innerText = 'Error';
    statusDiv.style.color = 'orange';
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.type === 'login') {
      if (data.success) {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('chatDiv').style.display = 'block';
      } else {
        document.getElementById('loginStatus').innerText = 'Login failed';
      }
    }
    if (data.type === 'message') {
      messagesDiv.innerHTML += `<div><strong>${data.user}:</strong> ${data.text}</div>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  };
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  if (!username || !password) return alert('Enter username and password');

  await initWebSocket(); // Only initializes once
  ws.send(JSON.stringify({ type: 'login', username, password }));
});

document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'message', text }));
  input.value = '';
});

// Allow sending message with Enter key
document.getElementById('msgInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') document.getElementById('sendBtn').click();
});
</script>
</body>
</html>
