<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Loader</title>
<style>
body { font-family: Arial; margin: 0; padding: 20px; }
#loginDiv, #chatDiv { max-width: 500px; margin: auto; }
#messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; background: #f9f9f9; }
input, button { width: 100%; margin: 5px 0; padding: 10px; box-sizing: border-box; }
#status, #statusChat { margin-bottom: 10px; }
</style>
</head>
<body>

<div id="loginDiv">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <p id="loginStatus"></p>
  <p id="status">Disconnected</p>
</div>

<div id="chatDiv" style="display:none;">
  <h2>Chat</h2>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type a message">
  <button id="sendBtn">Send</button>
  <p id="statusChat">Disconnected</p>
</div>

<script>
let ws = null;
let username = null;

// Fetch server URL
async function getServerURL() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/BlankoTheLegend/VeryHardAlgebra/refs/heads/main/Key.txt');
    return (await res.text()).trim();
  } catch(e) {
    alert('Failed to fetch chat server URL');
  }
}

// Initialize WebSocket
async function initWebSocket() {
  const serverURL = await getServerURL();
  if (!serverURL) return;

  ws = new WebSocket(serverURL);

  ws.onopen = () => updateStatus('Connected');
  ws.onclose = () => updateStatus('Disconnected');
  ws.onerror = (err) => {
    console.error('WebSocket error', err);
    updateStatus('Error');
  };

  ws.onmessage = msg => {
    try {
      const data = JSON.parse(msg.data);
      if (data.type === 'login') {
        if (data.success) {
          document.getElementById('loginDiv').style.display = 'none';
          document.getElementById('chatDiv').style.display = 'block';
        } else {
          document.getElementById('loginStatus').innerText = 'Login failed';
        }
      } else if (data.type === 'message') {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML += `<div><b>${data.user}:</b> ${data.text}</div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    } catch(e) {
      console.error('Failed to parse message', e);
    }
  };
}

// Update connection status
function updateStatus(text) {
  document.getElementById('status').innerText = text;
  document.getElementById('statusChat').innerText = text;
}

// Login function
async function login(event) {
  if (event) event.preventDefault();
  username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!username || !password) return alert('Enter username and password');

  if (!ws) await initWebSocket();

  // Send login only when WebSocket is open
  if (ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'login', username, password }));
  } else {
    ws.onopen = () => ws.send(JSON.stringify({ type: 'login', username, password }));
  }
}

// Send message function
function sendMessage() {
  const text = document.getElementById('msgInput').value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'message', text }));
  document.getElementById('msgInput').value = '';
}

// Unified click/touch handler
function addClickTouchListener(el, fn) {
  let touched = false;
  el.addEventListener('touchend', e => {
    touched = true;
    fn(e);
  });
  el.addEventListener('click', e => {
    if (!touched) fn(e);
  });
}

// Add event listeners
addClickTouchListener(document.getElementById('loginBtn'), login);
addClickTouchListener(document.getElementById('sendBtn'), sendMessage);

// Optional: scroll input into view on mobile
['username','password','msgInput'].forEach(id => {
  document.getElementById(id).addEventListener('focus', e => {
    e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
});
</script>

</body>
</html>
