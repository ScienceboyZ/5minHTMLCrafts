<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clear Local Storage</title>
  <script>
    // Clears local storage as soon as the page loads
    window.onload = function () {
      localStorage.clear();
      alert("Local storage has been cleared.");
    };
  </script>
</head>
<body>
  <h1>Local Storage Cleared</h1>
  <p>Your local storage has been cleared automatically on page load.</p>
</body>
</html>
