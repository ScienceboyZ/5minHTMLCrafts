<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Droppi
  </title>
  <link href="d.png" rel="icon" type="image/png"/>
  <style>
   @import url("https://fonts.googleapis.com/css2?family=Neucha&display=swap");

html {
	box-sizing: border-box;
}

:root {
	--to-do: #a2622d;
	--doing: #1b6161;
	--done: #248224;
	--on-hold: #a22d22;
}

body {
	margin: 0;
	background: url("./image.jpg");
	background-size: cover;
	background-position: 50% 60%;
	background-attachment: fixed;
	color: white;
	font-family: "Neucha", cursive;
	font-size: 20px;
	overflow-y: hidden;
}

h1 {
	letter-spacing: 2px;
	text-shadow: 2px 2px 5px black;
}

.main-title {
	text-align: center;
	font-size: 3rem;
}

ul {
	list-style-type: none;
	margin: 0;
	padding: 0;
}

.drag-container {
	margin: 20px;
}

.drag-list {
	display: flex;
	align-items: flex-start;
}

/* Columns */
.drag-column {
	flex: 1;
	margin: 0 10px;
	position: relative;
	background-color: rgba(0, 0, 0, 0.4);
	border-radius: 10px;
	overflow-x: hidden;
}

.to-do-column .header,
.to-do-column .solid,
.to-do-column .solid:hover,
.to-do-column .over {
	background-color: var(--to-do);
}

.doing-column .header,
.doing-column .solid,
.doing-column .solid:hover,
.doing-column .over {
	background-color: var(--doing);
}

.done-column .header,
.done-column .solid,
.done-column .solid:hover,
.done-column .over {
	background-color: var(--done);
}

.on-hold-column .header,
.on-hold-column .solid,
.on-hold-column .solid:hover,
.on-hold-column .over {
	background-color: var(--on-hold);
}

/* Custom Scrollbar */

/* To Be Done */
.custom-scroll-todo {
	overflow-y: auto;
	max-height: 75vh;
}

.custom-scroll-todo::-webkit-scrollbar-track {
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.4);
	border-radius: 10px;
	background-color: rgba(255, 255, 255, 0.3);
	margin-right: 5px;
}

.custom-scroll-todo::-webkit-scrollbar {
	width: 10px;
}

.custom-scroll-todo::-webkit-scrollbar-thumb {
	border-radius: 10px;
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.3);
	background-color: var(--to-do);
}

/* Doing */
.custom-scroll-doing {
	overflow-y: auto;
	max-height: 75vh;
}

.custom-scroll-doing::-webkit-scrollbar-track {
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.4);
	border-radius: 10px;
	background-color: rgba(255, 255, 255, 0.3);
	margin-right: 5px;
}

.custom-scroll-doing::-webkit-scrollbar {
	width: 10px;
}

.custom-scroll-doing::-webkit-scrollbar-thumb {
	border-radius: 10px;
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.3);
	background-color: var(--doing);
}

/* Done */
.custom-scroll-done {
	overflow-y: auto;
	max-height: 75vh;
}

.custom-scroll-done::-webkit-scrollbar-track {
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.4);
	border-radius: 10px;
	background-color: rgba(255, 255, 255, 0.3);
	margin-right: 5px;
}

.custom-scroll-done::-webkit-scrollbar {
	width: 10px;
}

.custom-scroll-done::-webkit-scrollbar-thumb {
	border-radius: 10px;
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.3);
	background-color: var(--done);
}

/* On Hold */
.custom-scroll {
	overflow-y: auto;
	max-height: 75vh;
}

.custom-scroll::-webkit-scrollbar-track {
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.4);
	border-radius: 10px;
	background-color: rgba(255, 255, 255, 0.3);
	margin-right: 5px;
}

.custom-scroll::-webkit-scrollbar {
	width: 10px;
}

.custom-scroll::-webkit-scrollbar-thumb {
	border-radius: 10px;
	box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.3);
	background-color: var(--on-hold);
}

.header {
	display: flex;
	justify-content: center;
	border-radius: 10px;
	margin: 10px;
}

.header h1 {
	font-size: 1.25rem;
}

/* Drag and Drop */
.over {
	padding: 50px 10px;
}

.drag-item-list {
	min-height: 50px;
}

.drag-item {
	margin: 10px;
	padding: 10px;
	height: fit-content;
	background-color: rgba(0, 0, 0, 0.8);
	border-radius: 10px;
	line-height: 1.5rem;
	letter-spacing: 1px;
	cursor: pointer;
}

.drag-item:focus {
	outline: none;
	background-color: white;
	color: black;
}

/* Add Button Group */
.add-btn-group {
	display: flex;
	justify-content: space-between;
}

.add-btn {
	margin: 10px;
	padding: 5px 10px;
	display: flex;
	align-items: center;
	cursor: pointer;
	width: fit-content;
	border-radius: 5px;
	transition: all 0.3s ease-in;
	user-select: none;
}

.add-btn:hover {
	background-color: rgba(255, 255, 255, 0.9);
	color: black;
}

.add-btn:active {
	transform: scale(0.97);
}

.solid {
	display: none;
}

.solid:hover {
	transition: unset;
	filter: brightness(95%);
	color: white;
}

.plus-sign {
	font-size: 1.5rem;
	margin-right: 5px;
	position: relative;
	top: -3px;
}

.add-container {
	margin: 10px;
	padding: 5px 10px;
	border-radius: 10px;
	background-color: rgba(255, 255, 255, 0.9);
	min-height: 100px;
	display: none;
}

.add-item {
	width: 100%;
	min-height: 100px;
	height: auto;
	background-color: white;
	border-radius: 10px;
	margin: 5px auto;
	resize: none;
	color: black;
	padding: 10px;
}

.add-item:focus {
	outline: none;
}

/* Media Query: Laptop */
@media screen and (max-width: 1800px) {
	.main-title {
		font-size: 2rem;
	}
}

/* Media Query: Large Smartphone (Vertical) */
@media screen and (max-width: 600px) {
	body {
		overflow-y: auto;
	}

	.drag-container {
		margin: 0;
	}

	.drag-list {
		display: block;
	}

	.drag-column {
		margin: 10px;
	}
}
  </style>
 </head>
 <body>

  <h1 class="main-title">

  <div class="drag-container">
   <ul class="drag-list">
    <!-- To Be Done Column -->
    <li class="drag-column to-do-column">
     <span class="header">
      <h1>

      </h1>
     </span>
     <!-- To Be Done Content -->
     <div class="custom-scroll-todo" id="to-do-content">

     <!-- Doing Content -->
     <div class="custom-scroll-doing" id="doing-content">
      <ul class="drag-item-list" id="doing-list" ondragenter="dragEnter(1)" ondragover="allowDrop(event)" ondrop="drop(event)">
      </ul>
     </div>
     <!-- Add Button Group -->
     <div class="add-btn-group">
      <div class="add-btn" onclick="showInputBox(1)">
       <span class="plus-sign">
        +
       </span>
       <span>
        Add Item
       </span>
      </div>
      <div class="add-btn solid" onclick="hideInputBox(1)">
       <span>
        Save Item
       </span>
      </div>
     </div>
     <div class="add-container">
      <div class="add-item" contenteditable="true">

     </div>
    </li>
    <!-- Done Column -->
    <li class="drag-column done-column">
     <span class="header">
      <h1>
       Done
      </h1>
     </span>
     <!-- Done Content -->
     <div class="custom-scroll-done" id="done-content">
      <ul class="drag-item-list" id="done-list" ondragenter="dragEnter(2)" ondragover="allowDrop(event)" ondrop="drop(event)">
      </ul>
     </div>
     <!-- Add Button Group -->
     <div class="add-btn-group">
      <div class="add-btn" onclick="showInputBox(2)">
       <span class="plus-sign">
        +
       </span>
       <span>
        Add Item
       </span>
      </div>
      <div class="add-btn solid" onclick="hideInputBox(2)">
       <span>

       </span>

     <div class="custom-scroll" id="on-hold-content">
      <ul class="drag-item-list" id="on-hold-list" ondragenter="dragEnter(3)" ondragover="allowDrop(event)" ondrop="drop(event)">
      </ul>
     </div>
     <!-- Add Button Group -->
     <div class="add-btn-group">
      <div class="add-btn" onclick="showInputBox(3)">
       <span class="plus-sign">
        +
       </span>
       <span>
        Add Item
       </span>

      <div class="add-btn solid" onclick="hideInputBox(3)">
       <span>

  <!-- Script -->
  <script>
   const addBtns = document.querySelectorAll(".add-btn:not(.solid)");
const saveItemBtns = document.querySelectorAll(".solid");
const addItemContainers = document.querySelectorAll(".add-container");
const addItems = document.querySelectorAll(".add-item");

// Item Lists
const listColumns = document.querySelectorAll(".drag-item-list");
const backlogListEl = document.getElementById("to-do-list");
const progressListEl = document.getElementById("doing-list");
const completeListEl = document.getElementById("done-list");
const onHoldListEl = document.getElementById("on-hold-list");

// Items
let updatedOnLoad = false;

// Initialize Arrays
let backlogListArray = [];
let progressListArray = [];
let completeListArray = [];
let onHoldListArray = [];
let listArrays = [];

// Drag Functionality
let draggedItem;
let dragging = false;
let currentColumn;

// Get Arrays from localStorage if available, set default values if not
function getSavedColumns() {
	if (localStorage.getItem("backlogItems")) {
		backlogListArray = JSON.parse(localStorage.backlogItems);
		progressListArray = JSON.parse(localStorage.progressItems);
		completeListArray = JSON.parse(localStorage.completeItems);
		onHoldListArray = JSON.parse(localStorage.onHoldItems);
	} else {
		const intro = prompt(
			"Type 'y' (Yes) if you want to display an Editable Sample? \n(Not typing 'y' will display a plane NEW board.)"
		);
		if (intro === "y" || intro === "Y") {
			backlogListArray = [
				"Write the documentation",
				"Post a technical article",
			];
			progressListArray = ["Work on Droppi project", "Listen to Spotify"];
			completeListArray = ["Submit a PR", "Review my projects code"];
			onHoldListArray = ["Get a girlfriend"];
		} else {
			backlogListArray = [];
			progressListArray = [];
			completeListArray = [];
			onHoldListArray = [];
		}
	}
}

// Set localStorage Arrays
function updateSavedColumns() {
	listArrays = [
		backlogListArray,
		progressListArray,
		completeListArray,
		onHoldListArray,
	];
	const arrayNames = ["backlog", "progress", "complete", "onHold"];
	arrayNames.forEach((arrayName, index) => {
		localStorage.setItem(
			`${arrayName}Items`,
			JSON.stringify(listArrays[index])
		);
	});

	// Similar as code above(DRY):

	// localStorage.setItem("backlogItems", JSON.stringify(backlogListArray));
	// localStorage.setItem("progressItems", JSON.stringify(progressListArray));
	// localStorage.setItem("completeItems", JSON.stringify(completeListArray));
	// localStorage.setItem("onHoldItems", JSON.stringify(onHoldListArray));
}

// Filter Array to remove empty values
function filterArray(array) {
	const filteredArray = array.filter((item) => item !== null);
	return filteredArray;
}

// Create DOM Elements for each list item
function createItemEl(columnEl, column, item, index) {
	// console.log("columnEl:", columnEl);
	// console.log("column:", column);
	// console.log("item:", item);
	// console.log("index:", index);
	// List Item
	const listEl = document.createElement("li");
	listEl.textContent = item;
	listEl.id = index;
	listEl.classList.add("drag-item");
	listEl.draggable = true;
	listEl.setAttribute("onfocusout", `updateItem(${index}, ${column})`);
	listEl.setAttribute("ondragstart", "drag(event)");
	listEl.contentEditable = true;
	// Append
	columnEl.appendChild(listEl);
}

// Update Columns in DOM - Reset HTML, Filter Array, Update localStorage
function updateDOM() {
	// Check localStorage once
	if (!updatedOnLoad) {
		getSavedColumns();
	}
	// Backlog Column
	backlogListEl.textContent = "";
	backlogListArray.forEach((backlogItem, index) => {
		createItemEl(backlogListEl, 0, backlogItem, index);
	});
	backlogListArray = filterArray(backlogListArray);
	// Progress Column
	progressListEl.textContent = "";
	progressListArray.forEach((progressItem, index) => {
		createItemEl(progressListEl, 1, progressItem, index);
	});
	progressListArray = filterArray(progressListArray);
	// Complete Column
	completeListEl.textContent = "";
	completeListArray.forEach((completeItem, index) => {
		createItemEl(completeListEl, 2, completeItem, index);
	});
	completeListArray = filterArray(completeListArray);
	// On Hold Column
	onHoldListEl.textContent = "";
	onHoldListArray.forEach((onHoldItem, index) => {
		createItemEl(onHoldListEl, 3, onHoldItem, index);
	});
	onHoldListArray = filterArray(onHoldListArray);
	// Run getSavedColumns only once, Update Local Storage
	updatedOnLoad = true;
	updateSavedColumns();
}

// Update Item - Delete if necessary, or update Array value
function updateItem(id, column) {
	const selectedArray = listArrays[column];
	const selectedColumn = listColumns[column].children;
	if (!dragging) {
		if (!selectedColumn[id].textContent) {
			delete selectedArray[id];
		} else {
			selectedArray[id] = selectedColumn[id].textContent;
		}
		updateDOM();
	}
}

// Add to Column List, Reset Textbox
function addToColumn(column) {
	const itemText = addItems[column].textContent;
	const selectedArray = listArrays[column];
	selectedArray.push(itemText);
	addItems[column].textContent = "";
	updateDOM(column);
}

// Show Add Item Input Box
function showInputBox(column) {
	addBtns[column].style.visibility = "hidden";
	saveItemBtns[column].style.display = "flex";
	addItemContainers[column].style.display = "flex";
}

// Hide Item Input Box
function hideInputBox(column) {
	addBtns[column].style.visibility = "visible";
	saveItemBtns[column].style.display = "none";
	addItemContainers[column].style.display = "none";
	addToColumn(column);
}

// Allows arrays to reflect Drag and Drop items
function rebuildArrays() {
	backlogListArray = [];
	for (let i = 0; i < backlogListEl.children.length; i++) {
		backlogListArray.push(backlogListEl.children[i].textContent);
	}
	progressListArray = [];
	for (let i = 0; i < progressListEl.children.length; i++) {
		progressListArray.push(progressListEl.children[i].textContent);
	}
	completeListArray = [];
	for (let i = 0; i < completeListEl.children.length; i++) {
		completeListArray.push(completeListEl.children[i].textContent);
	}
	onHoldListArray = [];
	for (let i = 0; i < onHoldListEl.children.length; i++) {
		onHoldListArray.push(onHoldListEl.children[i].textContent);
	}
	updateDOM();
}

// When Item Enters Column Area
function dragEnter(column) {
	listColumns[column].classList.add("over");
	currentColumn = column;
}

// When Item Starts Dragging
function drag(e) {
	draggedItem = e.target;
	dragging = true;
}

// Column Allows for Item to Drop
function allowDrop(e) {
	e.preventDefault();
}

// Dropping Item in Column
function drop(e) {
	e.preventDefault();
	const parent = listColumns[currentColumn];
	// Remove Background Color/Padding
	listColumns.forEach((column) => {
		column.classList.remove("over");
	});
	// Add item to Column
	parent.appendChild(draggedItem);
	// Dragging complete
	dragging = false;
	rebuildArrays();
}

// On Load
updateDOM();
  </script>
